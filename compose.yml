services:
  dotnet-dev:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: dotnetsignin-dev
    working_dir: /app
    volumes:
      - ./:/app:Z
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      # Sets the IP addresses and ports where Kestrel (the local web server) will listen for requests.
      # Ref: https://learn.microsoft.com/en-us/aspnet/core/fundamentals/servers/kestrel/endpoints
      - ASPNETCORE_URLS=http://+:5000

      # Tells the application it's running in development mode (enables detailed logs, hot reload context, etc.).
      # Ref: https://learn.microsoft.com/en-us/aspnet/core/fundamentals/environments
      - ASPNETCORE_ENVIRONMENT=Development

      # Forces 'dotnet watch' to automatically clean and restart the server without prompting if a major code change is detected.
      # Ref: https://learn.microsoft.com/en-us/dotnet/core/tools/dotnet-watch
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=true

      # Inject connection string from .env for EF Core
      - ConnectionStrings__DefaultConnection=Server=db;Database=${DB_NAME:-dotnetsignin};User=${DB_USER:-dotnet_user};Password=${DB_PASSWORD:-dotnet_secret};
    depends_on:
      - db
    command: >
      bash -c '
        CS_PROJ=$$(find . -maxdepth 2 -name "*.csproj" | head -n 1)
        if [ ! -z "$$CS_PROJ" ]; then
          echo "=> Found project: $$CS_PROJ"
          cd $$(dirname "$$CS_PROJ")
          dotnet restore && dotnet watch run --no-launch-profile
        else
          echo "========================================"
          echo " .NET SDK 8.0 Ready"
          echo " No .csproj found in /app. Create one:"
          echo "   ./dotnet.sh new webapp -n MyApp"
          echo "========================================"
          tail -f /dev/null
        fi
      '
    stdin_open: true
    tty: true

  dotnet-prod:
    # Compiles and runs the ultra-lightweight Native AOT binary using our multi-stage Containerfile.
    # Ref: https://docs.docker.com/compose/compose-file/build/
    build:
      context: .
      dockerfile: Containerfile
    container_name: dotnetsignin-prod
    # Always restart if the container crashes, unless manually stopped.
    restart: unless-stopped
    ports:
      # Exposes the production app on port 8080 (or PROD_APP_PORT if defined in .env)
      - "${PROD_APP_PORT:-8080}:8080"
    environment:
      # Sets the IP addresses and ports where Kestrel will listen inside the chiseled Ubuntu container.
      # Ref: https://learn.microsoft.com/en-us/aspnet/core/fundamentals/servers/kestrel/endpoints
      - ASPNETCORE_URLS=http://+:8080

      # Tells the application it's running in production mode (turns off development Swagger/Logs/Errors).
      # Ref: https://learn.microsoft.com/en-us/aspnet/core/fundamentals/environments
      - ASPNETCORE_ENVIRONMENT=Production

      # Inject connection string from .env for EF Core (Production)
      - ConnectionStrings__DefaultConnection=Server=db;Database=${DB_NAME:-dotnetsignin};User=${DB_USER:-dotnet_user};Password=${DB_PASSWORD:-dotnet_secret};
    depends_on:
      # Ensure the database starts before the application.
      - db

  dotnet:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /app
    environment:
      - DOTNET_CLI_TELEMETRY_OPTOUT=1
      - HOME=/tmp
      - ConnectionStrings__DefaultConnection=Server=db;Database=${DB_NAME:-dotnetsignin};User=${DB_USER:-dotnet_user};Password=${DB_PASSWORD:-dotnet_secret};
    volumes:
      - ./:/app:Z
      - nuget_cache:/tmp:Z
    entrypoint: ["dotnet"]
    stdin_open: true
    tty: true
    profiles:
      - cli

  db:
    image: mariadb:11
    container_name: dotnetsignin-db
    restart: always
    command: mariadbd --character-set-server=utf8 --collation-server=utf8_general_ci
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root_secret}
      - MARIADB_DATABASE=${DB_NAME:-dotnetsignin}
      - MARIADB_USER=${DB_USER:-dotnet_user}
      - MARIADB_PASSWORD=${DB_PASSWORD:-dotnet_secret}
    volumes:
      - db_data:/var/lib/mysql:Z

  phpmyadmin:
    image: phpmyadmin
    container_name: dotnetsignin-pma
    restart: always
    depends_on:
      - db
    environment:
      - PMA_HOST=db
    ports:
      - "${PMA_PORT:-8080}:80"

volumes:
  db_data:
  nuget_cache:
